name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, build, and stable Playwright test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Lint
        run: make lint

      - name: Build and typecheck
        run: make typecheck

      - name: Run stable Playwright test
        run: make test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/report/
          retention-days: 7

      - name: Upload Playwright traces and failures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/results/
          retention-days: 7
