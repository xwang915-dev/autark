name: Publish to npm

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish changed package versions
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: make build

      - name: Publish new package versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          package_dirs=(autk-core autk-map autk-db autk-plot autk-compute autk)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for dir in "${package_dirs[@]}"; do
            name=$(node -p "require('./${dir}/package.json').name")
            version=$(node -p "require('./${dir}/package.json').version")
            tag="${name}@${version}"

            if npm view "${name}@${version}" version --silent >/dev/null 2>&1; then
              echo "${name}@${version} is already published; skipping npm publish."
            else
              echo "Publishing ${name}@${version}..."
              npm publish "./${dir}" --access public --provenance
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists; skipping."
            else
              git tag "${tag}"
              git push origin "${tag}"
              echo "Created tag ${tag}."
            fi
          done
