<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Autark (Heat Islands)</title>
    <link rel="stylesheet" href="/src/niteroi/main.css">
</head>

<body>
    <div id="app">
        <div id="loading-overlay">
            <div id="loading-box">
                <div id="loading-spinner"></div>
                <h2 id="loading-title">Loading</h2>
                <p id="loading-text"></p>
                <p id="loading-note"></p>
            </div>
        </div>

        <canvas></canvas>

        <!-- ── Plot toggle button ─────────────────────────────────────────── -->
        <button id="plotToggle" title="Toggle plots">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 40 40">
                <polyline points="4,34 14,18 22,26 32,10" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <line x1="4" y1="36" x2="36" y2="36" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </button>

        <!-- ── Control panel ──────────────────────────────────────────────── -->
        <div id="controlPanel">
            <div id="panelBody">
                <div class="panel-section">
                    <div class="panel-section-title">Year</div>
                    <select id="yearSelect">
                        <option value="2001" selected>2001</option>
                        <option value="2002">2002</option>
                        <option value="2003">2003</option>
                        <option value="2004">2004</option>
                        <option value="2005">2005</option>
                        <option value="2006">2006</option>
                        <option value="2007">2007</option>
                        <option value="2008">2008</option>
                        <option value="2009">2009</option>
                        <option value="2010" >2010</option>
                        <option value="2011">2011</option>
                        <option value="2012">2012</option>
                        <option value="2013">2013</option>
                        <option value="2014">2014</option>
                        <option value="2015">2015</option>
                        <option value="2016">2016</option>
                        <option value="2017">2017</option>
                        <option value="2018">2018</option>
                        <option value="2019">2019</option>
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                    </select>
                </div>

                <div class="panel-section">
                    <div class="panel-section-title">Roads Color</div>
                    <label class="panel-checkbox">
                        <input type="checkbox" id="slopeToggle" checked>
                        Regression slope
                    </label>
                </div>
            </div>
        </div>

        <!-- ── Histogram panel ────────────────────────────────────────────── -->
        <div id="plotPanel">
            <div id="plotBar"></div>
            <div id="plotBody"></div>
            <div id="linePlotBody"></div>
        </div>
    </div>
</body>

<script>
    function setLoadingState(message, note) {
        const text = document.getElementById('loading-text');
        const noteEl = document.getElementById('loading-note');
        if (text) text.textContent = message;
        if (noteEl) noteEl.textContent = note ?? '';
    }

    function hideLoading() {
        document.getElementById('loading-overlay')?.classList.add('hidden');
    }

    function showError(message, note) {
        const overlay = document.getElementById('loading-overlay');
        const title = document.getElementById('loading-title');
        const text = document.getElementById('loading-text');
        const noteEl = document.getElementById('loading-note');
        overlay?.classList.remove('hidden');
        overlay?.classList.add('error');
        if (title) title.textContent = 'Loading Error';
        if (text) text.textContent = message;
        if (noteEl) noteEl.textContent = note ?? 'Please reload the page and try again.';
    }
</script>

<script type="module" src="/src/niteroi/main.ts"></script>

<script>
    // Toggle plot panel visibility
    (function () {
        const panel = document.querySelector('#plotPanel');
        panel.classList.add('hidden-plot');
        document.querySelector('#plotToggle').addEventListener('click', () => {
            panel.classList.toggle('hidden-plot');
        });
    })();

    // Draggable histogram panel
    (function () {
        const panel = document.querySelector('#plotPanel');
        const bar = document.querySelector('#plotBar');
        let startX = 0, startY = 0;

        bar.addEventListener('pointerdown', e => {
            startX = e.clientX;
            startY = e.clientY;
            bar.setPointerCapture(e.pointerId);
        });

        bar.addEventListener('pointermove', e => {
            if (!bar.hasPointerCapture(e.pointerId)) return;
            const newLeft = panel.offsetLeft + (e.clientX - startX);
            const newTop  = panel.offsetTop  + (e.clientY - startY);
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';
            panel.style.left = newLeft + 'px';
            panel.style.top  = newTop + 'px';
            startX = e.clientX;
            startY = e.clientY;
        });

        bar.addEventListener('pointerup', e => bar.releasePointerCapture(e.pointerId));
    })();
</script>

</html>
